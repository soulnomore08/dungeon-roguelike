<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dungeon Roguelike</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        font-family: monospace;
      }
      canvas { display: block; }

      #panel-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.88);
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #ddd;
        z-index: 10;
        gap: 14px;
      }
      #panel-overlay h3 {
        color: #e8c97a;
        letter-spacing: 2px;
        font-size: 16px;
        margin-bottom: 6px;
      }
      #panel-overlay p {
        color: #999;
        font-size: 12px;
        max-width: 320px;
        text-align: center;
        line-height: 1.5;
      }
      .panel-btn {
        background: #1a1a2e;
        border: 1px solid #8e44ad;
        color: #ccc;
        padding: 12px 22px;
        font-family: monospace;
        font-size: 13px;
        cursor: pointer;
        border-radius: 4px;
        width: 260px;
        text-align: left;
        transition: all 0.15s;
      }
      .panel-btn:hover {
        border-color: #e8c97a;
        color: #e8c97a;
        background: #2a1a3e;
      }
      .panel-btn-wide {
        width: 280px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="panel-overlay">
      <h3 id="panel-title">PANEL</h3>
      <p id="panel-subtitle"></p>
      <div id="panel-buttons" style="display:flex; flex-direction:column; gap:10px;"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
